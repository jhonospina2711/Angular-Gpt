<div class="col-start-1 col-end-9 p-3 rounded-lg">
  <div class="flex flex-row items-start">
    <div class="flex items-center justify-center h-10 w-10 rounded-full bg-green-600 flex-shrink-0">
      G
    </div>
    <div class="relative ml-3 text-sm bg-black bg-opacity-25 pt-3 pb-2 px-4 shadow rounded-xl max-w-full">
      <p class="mb-2 whitespace-pre-wrap text-white/80 font-normal" style="font-family: Poppins-Regular, sans-serif;">{{ answer }}</p>

      @if (sources.length > 0) {
        <div class="mt-3 border-t border-white border-opacity-20 pt-2">
          <h4 class="text-xs text-indigo-400 font-semibold mb-1">Fuentes</h4>
          <ul class="list-none space-y-1">
            @for (source of sources; track $index) {
              <li>
                <a
                  [href]="source"
                  target="_blank"
                  rel="noopener noreferrer"
                  class="text-indigo-300 hover:text-indigo-100 underline text-xs break-all"
                >{{ source }}</a>
              </li>
            }
          </ul>
        </div>
      }

      @if (model) {
        <p class="mt-2 text-xs text-gray-500">Modelo: {{ model }} &nbsp;|&nbsp; Páginas indexadas: {{ indexed_pages }}</p>
      }
    </div>
  </div>
</div>
