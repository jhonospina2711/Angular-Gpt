<div class="chat-container flex flex-col h-screen">
  <div class="chat-messages flex-1 overflow-y-auto">
    <div class="grid gap-y-2">
      <app-chat-message text="¿En qué puedo ayudarte? Consulta sobre productos de inversión." />

      @for (message of messages(); track $index) {
        @if (message.isGpt) {
          <app-gpt-message-qa-chat
            [answer]="message.info!.answer"
            [sources]="message.info!.sources"
            [model]="message.info!.model"
            [indexed_pages]="message.info!.indexed_pages"
          />
        } @else {
          <app-my-message [text]="message.text!" />
        }
      }

      @if (isLoading()) {
        <app-typing-loader />
      }

      @if (errorMessage()) {
        <div class="col-start-1 col-end-9 p-3">
          <p class="text-red-400 text-sm ml-3">{{ errorMessage() }}</p>
        </div>
      }
    </div>
  </div>

  <app-text-message-box
    placeholder="Escribe tu consulta (mínimo 3 caracteres)..."
    (onMessage)="handleMessage($event)"
  />
</div>
